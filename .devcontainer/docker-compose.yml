services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: claudie
      POSTGRES_PASSWORD: claudie
      POSTGRES_DB: claudie_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claudie -d claudie_dev"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    image: mcr.microsoft.com/devcontainers/python:3.11
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    environment:
      DATABASE_URL: postgresql+psycopg://claudie:claudie@db:5432/claudie_dev
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:
