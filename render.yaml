# Render Blueprint: https://render.com/docs/blueprint-spec
# Deploy: on render.com, "New +" -> "Blueprint", point it at this repo.
# Provisions a free Postgres instance and a free web service (built from
# the repo-root Dockerfile) that serves both the API and the frontend.
databases:
  - name: claudie-db
    plan: free
    databaseName: claudie
    user: claudie

services:
  - type: web
    name: claudie
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: claudie-db
          property: connectionString
      - key: DEMO_USERNAME
        value: claudie
      # No default value on purpose - Render generates a random secret at
      # provision time. Find it under the service's Environment tab and
      # share it with whoever needs access; the app is otherwise open to
      # anyone with the URL, since there's no real per-user login yet.
      - key: DEMO_PASSWORD
        generateValue: true
